# tileport default configuration
# Place your config at ~/.config/tileport/tileport.toml

[gaps]
inner = 8
outer = 8

# Keybindings (default: alt-based shortcuts)
# If you override keybindings, you replace the entire set -- include all bindings you want.

[[keybindings]]
modifiers = ["alt"]
key = "j"
command = { command = "focus_next" }

[[keybindings]]
modifiers = ["alt"]
key = "k"
command = { command = "focus_prev" }

[[keybindings]]
modifiers = ["alt"]
key = "f"
command = { command = "toggle_fullscreen" }

[[keybindings]]
modifiers = ["alt", "shift"]
key = "f"
command = { command = "toggle_float" }

[[keybindings]]
modifiers = ["alt"]
key = "1"
command = { command = "switch_workspace", workspace = 1 }

[[keybindings]]
modifiers = ["alt"]
key = "2"
command = { command = "switch_workspace", workspace = 2 }

