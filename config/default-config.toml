# tileport default configuration
# Place your config at ~/.config/tileport/tileport.toml

[gaps]
inner = 8
outer = 8

# Keybindings (default: alt-based shortcuts)
# If you override keybindings, you replace the entire set -- include all bindings you want.

# Directional focus (zone-aware; falls back to next/prev in monocle)
[[keybindings]]
modifiers = ["alt"]
key = "j"
command = { command = "focus_direction", direction = "down" }

[[keybindings]]
modifiers = ["alt"]
key = "k"
command = { command = "focus_direction", direction = "up" }

[[keybindings]]
modifiers = ["alt"]
key = "h"
command = { command = "focus_direction", direction = "left" }

[[keybindings]]
modifiers = ["alt"]
key = "l"
command = { command = "focus_direction", direction = "right" }

# Move window to adjacent zone
[[keybindings]]
modifiers = ["alt", "shift"]
key = "h"
command = { command = "move_to_zone", direction = "left" }

[[keybindings]]
modifiers = ["alt", "shift"]
key = "l"
command = { command = "move_to_zone", direction = "right" }

# Promote focused window to primary zone
[[keybindings]]
modifiers = ["alt"]
key = "enter"
command = { command = "promote_to_primary" }

[[keybindings]]
modifiers = ["alt"]
key = "f"
command = { command = "toggle_fullscreen" }

[[keybindings]]
modifiers = ["alt", "shift"]
key = "f"
command = { command = "toggle_float" }

[[keybindings]]
modifiers = ["alt"]
key = "1"
command = { command = "switch_workspace", workspace = 1 }

[[keybindings]]
modifiers = ["alt"]
