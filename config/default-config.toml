# Layout presets (uncomment and customize)
# Built-in types: "columns", "rows", "monocle"
#
# [layouts.laptop-2col]
# type = "columns"
# ratios = [0.5, 0.5]
#
# [layouts.wide-3col]
# type = "columns"
# ratios = [0.25, 0.50, 0.25]
#
# [layouts.main-stack]
# type = "columns"
# ratios = [0.6, 0.4]
# [layouts.main-stack.splits.1]
# type = "rows"
# ratios = [0.5, 0.5]
#
# Workspace assignments (uncomment to use)
# [workspaces.1]
# layout = "laptop-2col"
# [workspaces.2]
# layout = "wide-3col"
